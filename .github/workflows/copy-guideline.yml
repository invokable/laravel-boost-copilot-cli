name: Copy guideline

on:
  push:
    branches: [ main ]
    paths:
      - 'resources/boost/guidelines/core.blade.php'

permissions:
  contents: write

jobs:
  copy-guideline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Copy guideline
        run: cp resources/boost/guidelines/core.blade.php .ai/guidelines/copilot-cli.blade.php

      - name: Commit Changes
        uses: stefanzweifel/git-auto-commit-action@04702edda442b2e678b25b537cec683a1493fcb9 # v7.1.0
        with:
          commit_message: Update guideline
          commit_options: '--no-verify'
          file_pattern: '.ai/guidelines/copilot-cli.blade.php'
